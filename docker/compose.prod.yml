version: "3.9"

services:
  api:
    container_name: api
    build:
      context: ../
      dockerfile: ./docker/DOCKERFILE
    restart: unless-stopped
    env_file:
      - ../.env
      
    ports:
      - "5050:5050"
    networks:
      - tsts-network

  postgres:
    container_name: postgres_db
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tsts-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - tsts-network

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT}:${MINIO_API_PORT}"       # MinIO console & API
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"       # MinIO admin console
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_CERT_FILE: ${MINIO_CERT_FILE}
      MINIO_KEY_FILE: ${MINIO_KEY_FILE}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    volumes:
      - minio_data:/data
      - /opt/certs:/root/certs:ro
    networks:
      - tsts-network

volumes:
  postgres_data:  
  redis-data:
  minio_data:
  
networks:
  tsts-network:
    external: true

