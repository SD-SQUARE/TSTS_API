version: "3.9"

services:
  api:
    container_name: api
    build:
      context: ../
      dockerfile: ./docker/DOCKERFILE
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5050:5050"
    networks:
      - tsts-network
    environment:
      HOST_METRICS_EXPORTER_URL: http://node-exporter:9100/metrics
    volumes:
      - /opt/tsts-project/certs:/certs:ro

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host/rootfs
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    pid: host
    ports:
      - "9100:9100"
    volumes:
      - /:/host/rootfs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - tsts-network

  postgres:
    container_name: postgres_db
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tsts-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - tsts-network

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT}:${MINIO_API_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_CERT_FILE: ${MINIO_CERT_FILE}
      MINIO_KEY_FILE: ${MINIO_KEY_FILE}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    volumes:
      - minio_data:/data
      - /opt/tsts-project/certs:/root/.minio/certs
    networks:
      - tsts-network

  mongodb:
    image: mongo:4.4
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    networks:
      - tsts-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - tsts-network
    # Ollama has its own CLI — use it for the health check (no curl needed)
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 20s
    # ── GPU support (uncomment if you have an NVIDIA GPU) ──────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── One-time model pull job ─────────────────────────────────────────────────
  # Pulls the configured model on first startup, then exits.
  # Uses the Ollama CLI directly — no curl dependency.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - tsts-network
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    entrypoint: >
      sh -c "
        echo 'Pulling model: ${OLLAMA_MODEL:-llama3.2}...';
        ollama pull ${OLLAMA_MODEL:-llama3.2};
        echo 'Model pull completed.';
      "

volumes:
  postgres_data:
  redis-data:
  minio_data:
  mongo_data:
  ollama_data:
    name: ollama_data

networks:
  tsts-network:
    external: true
